<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - FireSchedule</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; }
        main { padding: 2rem; max-width: 600px; margin: 0 auto; text-align: center; }
        .card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .success { color: #27ae60; font-size: 3rem; margin-bottom: 1rem; }
        h2 { margin-bottom: 1rem; }
        .item-details { text-align: left; background: #f9f9f9; padding: 1rem; border-radius: 4px; margin: 1rem 0; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #667eea; color: white; text-decoration: none; border-radius: 4px; margin: 0.5rem; }
        .btn:hover { background: #5568d3; }
    </style>
</head>
<body>
    <header><h1>FireSchedule</h1></header>
    <main>
        <div class="card">
            <div class="success">✓</div>
            <h2>{{ item_type }} Added Successfully!</h2>
            <div class="item-details">
                <p><strong>Title:</strong> {{ item.title }}</p>
                <p><strong>ID:</strong> {{ item.id[:18] }}...</p>
            </div>
            <a href="/" class="btn">Home</a>
            <a href="/add" class="btn">Add Another</a>
        </div>
    </main>
</body>
</html>
