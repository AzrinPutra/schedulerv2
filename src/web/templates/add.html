<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add - FireSchedule</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; }
        nav { background: white; padding: 0.75rem 1.5rem; border-bottom: 1px solid #eee; }
        nav a { margin-right: 1.5rem; text-decoration: none; color: #667eea; font-weight: 500; }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        .form-card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        .btn:hover { background: #5568d3; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; }
        .tab { padding: 0.75rem 1.5rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { border-bottom-color: #667eea; color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <header><h1>FireSchedule - Add New</h1></header>
    <nav>
        <a href="/">Home</a>
        <a href="/tasks">Tasks</a>
        <a href="/events">Events</a>
        <a href="/calendar">Calendar</a>
        <a href="/add">Add New</a>
    </nav>
    <main>
        <div class="form-card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('task')">Task</div>
                <div class="tab" onclick="switchTab('event')">Event</div>
            </div>
            
            <div id="task-form" class="tab-content active">
                <h2>Add New Task</h2>
                <form action="/add/task" method="post">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" required placeholder="Task title">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="3" placeholder="Optional description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" name="due_date">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            {% for cat in categories %}
                            <option value="{{ cat.value }}">{{ cat.value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            {% for pri in priorities %}
                            <option value="{{ pri.value }}">{{ pri.value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn">Add Task</button>
                </form>
            </div>
            
            <div id="event-form" class="tab-content">
                <h2>Add New Event</h2>
                <form action="/add/event" method="post">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" required placeholder="Event title">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="3" placeholder="Optional description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date_str" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" name="time_str">
                    </div>
                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" name="duration" value="60" min="15">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            {% for cat in categories %}
                            <option value="{{ cat.value }}">{{ cat.value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            {% for pri in priorities %}
                            <option value="{{ pri.value }}">{{ pri.value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn">Add Event</button>
                </form>
            </div>
        </div>
    </main>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-form').classList.add('active');
        }
    </script>
</body>
</html>
